name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push myapp_container
        uses: docker/build-push-action@v5
        with:
          context: ./myapp_container
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp_container:latest

      - name: Build and push mynginx_container
        uses: docker/build-push-action@v5
        with:
          context: ./mynginx_container
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mynginx_container:latest
